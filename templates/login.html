{% extends "base.html" %}

{% block title %}Login | Work Reports{% endblock %}

{% block content %}
<section class="card login-card">
  <div class="card-copy">
    <p class="section-label">Dashboard access</p>
    <h2>Enter your API key</h2>
    <p>Use the same key your agents use for pushing reports. It unlocks the dashboard for this browser session.</p>
  </div>

  <form method="post" class="login-form">
    <label for="api_key">API key</label>
    <input id="api_key" name="api_key" type="password" placeholder="Paste APP_API_KEY" required>
    <button type="submit">Open dashboard</button>
  </form>
</section>
{% endblock %}
